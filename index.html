
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilistica Audios Aleatorios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">

        <h1>Estilistica Audios Aleatorios</h1>

        <audio id="audioPlayer" controls></audio>

        <div class="botones">
            <button id="btnRespuesta">
                Mostrar respuesta
            </button>

            <button id="btnSiguiente">
                Siguiente audio
            </button>
        </div>

        <div id="respuesta" class="respuesta oculto">
            <p><strong>Tema:</strong> <span id="tema"></span></p>
            <p><strong></strong> <span id="interprete"></span></p> 
            <p><strong>Género:</strong> <span id="genero"></span></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
